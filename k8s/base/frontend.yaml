apiVersion: apps/v1
kind: Deployment
metadata:
  name: formula-frontend
  namespace: formula-one-fantasy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: formula-frontend
  template:
    metadata:
      labels:
        app: formula-frontend
    spec:
      containers:
        - name: frontend
          image: formula-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: formula-frontend
  namespace: formula-one-fantasy
spec:
  selector:
    app: formula-frontend
  ports:
    - port: 80
      targetPort: 80

